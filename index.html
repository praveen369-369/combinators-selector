<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Combinator Selectors Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <h2>This is the heading</h2>
    <p>This paragraph immediately follows the h2, so it gets a green border.</p>
    <p>This second paragraph is still red (descendant selector) but has no green border (it's not immediately after the h2).</p>
  </div>
</body>
</html>
